<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ADNU Professor Availability · Login / Register</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #eef2f9 0%, #d9e2ef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .auth-container {
            max-width: 1000px;
            width: 100%;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2), 0 1px 3px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            display: flex;
            flex-wrap: wrap;
            transition: all 0.2s;
        }

        .auth-visual {
            flex: 1.2;
            background: #f0f6fe;
            padding: 2rem 1.8rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-right: 1px solid #e2edf7;
        }

        .uni-badge {
            margin-bottom: 1rem;
        }

        .uni-badge i {
            font-size: 3rem;
            color: #1a4d8c;
            background: white;
            padding: 1rem;
            border-radius: 2rem;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.05);
        }

        .auth-visual h2 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #0f2b3d;
            margin: 0.75rem 0 0.5rem;
        }

        .auth-visual p {
            color: #4a627a;
            font-size: 0.9rem;
            margin-bottom: 1.8rem;
            line-height: 1.4;
        }

        .color-hint {
            display: flex;
            gap: 0.7rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .color-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 1px rgba(0, 0, 0, 0.3);
        }

        .auth-form-panel {
            flex: 1.5;
            padding: 2rem 2rem 2.2rem;
            background: white;
        }

        .tab-header {
            display: flex;
            gap: 0.5rem;
            background: #f1f5f9;
            padding: 0.4rem;
            border-radius: 60px;
            margin-bottom: 1.8rem;
            width: fit-content;
        }

        .tab-btn {
            border: none;
            background: transparent;
            padding: 0.6rem 1.6rem;
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: 40px;
            cursor: pointer;
            font-family: inherit;
            color: #4b5563;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: white;
            color: #1a4d8c;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border: 0.5px solid #dce5ef;
        }

        .role-switch {
            display: flex;
            gap: 1rem;
            background: #f8fafc;
            padding: 0.5rem;
            border-radius: 60px;
            margin-bottom: 1.5rem;
        }

        .role-option {
            flex: 1;
            text-align: center;
            padding: 0.5rem 0;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            color: #5b6e8c;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .role-option.active {
            background: white;
            color: #1a4d8c;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
            border: 1px solid #e0e7ef;
        }

        .input-group {
            margin-bottom: 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #1e3a5f;
            letter-spacing: 0.3px;
        }

        .input-field {
            display: flex;
            align-items: center;
            background: #f8fafd;
            border: 1px solid #e2edf2;
            border-radius: 16px;
            padding: 0.7rem 1rem;
            transition: 0.2s;
        }

        .input-field i {
            color: #8aa0bc;
            width: 24px;
            font-size: 1rem;
        }

        .input-field input,
        .input-field select {
            border: none;
            background: transparent;
            width: 100%;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            color: #1f2f48;
        }

        .input-field:focus-within {
            border-color: #1a4d8c;
            box-shadow: 0 0 0 2px rgba(26, 77, 140, 0.1);
        }

        .forgot-link {
            text-align: right;
            font-size: 0.75rem;
            margin: -0.2rem 0 1rem;
        }

        .forgot-link a {
            color: #1a4d8c;
            text-decoration: none;
            font-weight: 500;
        }

        .submit-btn {
            width: 100%;
            background: #1a4d8c;
            border: none;
            padding: 0.85rem;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.95rem;
            color: white;
            font-family: inherit;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        .submit-btn:hover {
            background: #0f3b6d;
            transform: scale(0.98);
        }

        .switch-text {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #5b6e8c;
        }

        .switch-text span {
            color: #1a4d8c;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }

        .error-msg {
            color: #d32f2f;
            font-size: 0.7rem;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .hidden {
            display: none;
        }

        hr {
            margin: 0.5rem 0;
            border-color: #eef2f8;
        }

        @media (max-width: 780px) {
            .auth-container {
                flex-direction: column;
                max-width: 500px;
            }

            .auth-visual {
                border-right: none;
                border-bottom: 1px solid #e2edf7;
                padding: 1.8rem;
            }

            .auth-form-panel {
                padding: 1.8rem;
            }
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-visual">
            <div class="uni-badge">
                <i class="fas fa-chalkboard-user"></i>
            </div>
            <h2>Faculty Availability Hub</h2>
            <p>Real‑time status • Five colors</p>
            <div class="color-hint">
                <div class="color-dot" style="background: #2e7d32;">✓</div>
                <div class="color-dot" style="background: #f57c00;">⌛</div>
                <div class="color-dot" style="background: #1976d2;">💻</div>
                <div class="color-dot" style="background: #6b7280;">🌴</div>
                <div class="color-dot" style="background: #dc2626;">🩺</div>
            </div>
        </div>

        <div class="auth-form-panel" id="authPanel">
            <div class="tab-header">
                <button class="tab-btn active" id="loginTabBtn">Login</button>
                <button class="tab-btn" id="registerTabBtn">Register</button>
            </div>

            <!-- LOGIN FORM -->
            <div id="loginFormContainer">
                <form id="loginForm">
                    <div class="role-switch" id="loginRoleGroup">
                        <div class="role-option active" data-role="faculty-login">
                            <i class="fas fa-chalkboard-user"></i> Faculty
                        </div>
                        <div class="role-option" data-role="student-login">
                            <i class="fas fa-user-graduate"></i> Student
                        </div>
                    </div>

                    <div class="input-group">
                        <label><i class="far fa-envelope"></i> Email address</label>
                        <div class="input-field">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="loginEmail" placeholder="university@adnu.edu.ph" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label><i class="fas fa-lock"></i> Password</label>
                        <div class="input-field">
                            <i class="fas fa-key"></i>
                            <input type="password" id="loginPassword" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="forgot-link">
                        <a href="#" id="forgotPwdLink">Forgot password?</a>
                    </div>

                    <!-- Sign In button: now redirects to dashboard without any pop-up -->
                    <button type="submit" class="submit-btn">
                        <i class="fas fa-arrow-right-to-bracket"></i> Sign In
                    </button>
                    <div class="switch-text">
                        Don't have an account? <span id="switchToRegister">Register</span>
                    </div>
                </form>
            </div>

            <!-- REGISTER FORM (unchanged functionality) -->
            <div id="registerFormContainer" class="hidden">
                <form id="registerForm">
                    <div class="role-switch" id="registerRoleGroup">
                        <div class="role-option active" data-role="faculty-reg">
                            <i class="fas fa-chalkboard-user"></i> Faculty
                        </div>
                        <div class="role-option" data-role="student-reg">
                            <i class="fas fa-user-graduate"></i> Student
                        </div>
                    </div>

                    <div class="input-group">
                        <label><i class="fas fa-user"></i> Full Name</label>
                        <div class="input-field">
                            <i class="fas fa-user-circle"></i>
                            <input type="text" id="fullName" placeholder="e.g., Maria R. Santos" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label><i class="fas fa-envelope"></i> Email address</label>
                        <div class="input-field">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="regEmail" placeholder="name@adnu.edu.ph" required>
                        </div>
                    </div>

                    <div id="dynamicFacultyFields">
                        <div class="input-group">
                            <label><i class="fas fa-building"></i> Department</label>
                            <div class="input-field">
                                <i class="fas fa-layer-group"></i>
                                <select id="departmentSelect">
                                    <option value="Computer Studies">Computer Studies</option>
                                    <option value="Business & Tech">Business & Tech</option>
                                    <option value="Engineering">Engineering</option>
                                    <option value="Arts & Sciences">Arts & Sciences</option>
                                    <option value="Mathematics">Mathematics</option>
                                </select>
                            </div>
                        </div>
                        <div class="input-group" id="officeLocationGroup">
                            <label><i class="fas fa-location-dot"></i> Office Location</label>
                            <div class="input-field">
                                <i class="fas fa-door-open"></i>
                                <input type="text" id="officeLocation" placeholder="e.g., RM 402 / 3rd floor">
                            </div>
                        </div>
                    </div>

                    <div id="dynamicStudentFields" class="hidden">
                        <div class="input-group">
                            <label><i class="fas fa-calendar-alt"></i> Year Level</label>
                            <div class="input-field">
                                <i class="fas fa-graduation-cap"></i>
                                <select id="yearLevel">
                                    <option value="1st Year">1st Year</option>
                                    <option value="2nd Year">2nd Year</option>
                                    <option value="3rd Year">3rd Year</option>
                                    <option value="4th Year">4th Year</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="input-group">
                        <label><i class="fas fa-lock"></i> Password</label>
                        <div class="input-field">
                            <i class="fas fa-key"></i>
                            <input type="password" id="regPassword" placeholder="Minimum 8 characters" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label><i class="fas fa-check-circle"></i> Confirm Password</label>
                        <div class="input-field">
                            <i class="fas fa-shield-alt"></i>
                            <input type="password" id="confirmPassword" placeholder="Repeat password" required>
                        </div>
                        <div id="passwordMatchError" class="error-msg hidden"><i
                                class="fas fa-exclamation-triangle"></i> Passwords do not match</div>
                    </div>

                    <button type="submit" class="submit-btn"><i class="fas fa-user-plus"></i> Register</button>
                    <div class="switch-text">
                        Already have an account? <span id="switchToLogin">Sign In</span>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // DOM elements
        const loginContainer = document.getElementById('loginFormContainer');
        const registerContainer = document.getElementById('registerFormContainer');
        const loginTab = document.getElementById('loginTabBtn');
        const registerTab = document.getElementById('registerTabBtn');
        const switchToRegisterSpan = document.getElementById('switchToRegister');
        const switchToLoginSpan = document.getElementById('switchToLogin');

        const loginRoleOptions = document.querySelectorAll('#loginRoleGroup .role-option');
        const registerRoleOptions = document.querySelectorAll('#registerRoleGroup .role-option');
        const dynamicFacultyDiv = document.getElementById('dynamicFacultyFields');
        const dynamicStudentDiv = document.getElementById('dynamicStudentFields');
        const officeLocationGroup = document.getElementById('officeLocationGroup');

        function showLogin() {
            loginContainer.classList.remove('hidden');
            registerContainer.classList.add('hidden');
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
        }

        function showRegister() {
            loginContainer.classList.add('hidden');
            registerContainer.classList.remove('hidden');
            registerTab.classList.add('active');
            loginTab.classList.remove('active');
            const activeRole = document.querySelector('#registerRoleGroup .role-option.active');
            if (activeRole && activeRole.getAttribute('data-role') === 'student-reg') {
                toggleRegisterFields('student');
            } else {
                toggleRegisterFields('faculty');
            }
        }

        function toggleRegisterFields(role) {
            if (role === 'faculty') {
                dynamicFacultyDiv.classList.remove('hidden');
                dynamicStudentDiv.classList.add('hidden');
                if (officeLocationGroup) officeLocationGroup.style.display = 'block';
            } else {
                dynamicFacultyDiv.classList.add('hidden');
                dynamicStudentDiv.classList.remove('hidden');
                if (officeLocationGroup) officeLocationGroup.style.display = 'none';
            }
        }

        registerRoleOptions.forEach(opt => {
            opt.addEventListener('click', function () {
                registerRoleOptions.forEach(o => o.classList.remove('active'));
                this.classList.add('active');
                const roleVal = this.getAttribute('data-role');
                if (roleVal === 'faculty-reg') {
                    toggleRegisterFields('faculty');
                } else {
                    toggleRegisterFields('student');
                }
            });
        });

        loginRoleOptions.forEach(opt => {
            opt.addEventListener('click', function () {
                loginRoleOptions.forEach(o => o.classList.remove('active'));
                this.classList.add('active');
            });
        });

        document.getElementById('forgotPwdLink')?.addEventListener('click', (e) => {
            e.preventDefault();
            // Optional: show a simple message without alert? You can remove alert completely.
            // For demo, we'll just do nothing or a console log.
            console.log('Forgot password clicked - no popup');
        });

        // LOGIN SUBMIT: redirect to dashboard (no pop-up)
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            // You can add simple validation if desired, but no alerts.
            // Direct redirect to Django dashboard URL.
            // Use Django's url tag if this template is served through Django.
            // Hardcoded fallback to '/dashboard/'
            window.location.href = "{% url 'dashboard' %}";  // This will be rendered by Django
            // If you want a hardcoded fallback (in case of direct HTML view), uncomment below:
            // window.location.href = '/dashboard/';
        });

        // Register submit handler (keeps alerts, but you can remove them if you want)
        const regForm = document.getElementById('registerForm');
        const pwdMatchError = document.getElementById('passwordMatchError');

        regForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            const activeRegRole = document.querySelector('#registerRoleGroup .role-option.active');
            let role = activeRegRole?.getAttribute('data-role') === 'faculty-reg' ? 'Professor' : 'Student';

            if (!fullName || !email || !password || !confirm) {
                alert('❌ All fields are required.');
                return;
            }
            if (password !== confirm) {
                pwdMatchError.classList.remove('hidden');
                return;
            } else {
                pwdMatchError.classList.add('hidden');
            }
            if (password.length < 6) {
                alert('⚠️ Password must be at least 6 characters.');
                return;
            }

            if (role === 'Professor') {
                const officeLocation = document.getElementById('officeLocation')?.value.trim();
                if (!officeLocation) {
                    alert('📌 Office location is required for professors (e.g., RM 402).');
                    return;
                }
            }

            // Registration success: show alert (can be removed if you want, but it's fine for demo)
            alert(`🎉 Registration successful!\nRole: ${role}\nYou can now login.`);
            showLogin();
            regForm.reset();
            pwdMatchError.classList.add('hidden');
        });

        const regPass = document.getElementById('regPassword');
        const confirmPass = document.getElementById('confirmPassword');
        function validateMatch() {
            if (regPass.value && confirmPass.value && regPass.value !== confirmPass.value) {
                pwdMatchError.classList.remove('hidden');
            } else {
                pwdMatchError.classList.add('hidden');
            }
        }
        regPass.addEventListener('input', validateMatch);
        confirmPass.addEventListener('input', validateMatch);

        loginTab.addEventListener('click', showLogin);
        registerTab.addEventListener('click', showRegister);
        if (switchToRegisterSpan) switchToRegisterSpan.addEventListener('click', showRegister);
        if (switchToLoginSpan) switchToLoginSpan.addEventListener('click', showLogin);

        showLogin();
        const defaultRegRole = document.querySelector('#registerRoleGroup .role-option[data-role="faculty-reg"]');
        if (defaultRegRole) {
            defaultRegRole.classList.add('active');
            document.querySelector('#registerRoleGroup .role-option[data-role="student-reg"]')?.classList.remove('active');
            toggleRegisterFields('faculty');
        }
        const defaultLoginRole = document.querySelector('#loginRoleGroup .role-option[data-role="faculty-login"]');
        if (defaultLoginRole) {
            defaultLoginRole.classList.add('active');
            document.querySelector('#loginRoleGroup .role-option[data-role="student-login"]')?.classList.remove('active');
        }
        if (officeLocationGroup) officeLocationGroup.style.display = 'block';
    </script>
</body>

</html>
